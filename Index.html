<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Esports Scoreboard</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: radial-gradient(circle, #020617, #000);
}

/* Header */
h1 {
    margin: 15px;
    text-shadow: 0 0 15px cyan;
}

/* Controls */
.controls {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    margin: 15px;
    display: inline-block;
    border-radius: 10px;
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

/* Buttons */
button {
    padding: 7px 10px;
    margin: 3px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.add { background: #22c55e; }
.del { background: #ef4444; }
.edit { background: #3b82f6; }
.point { background: #facc15; }

/* PODIUM */
.podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 20px;
    margin-top: 20px;
}

.place {
    width: 180px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
}

.first { border: 2px solid gold; box-shadow: 0 0 20px gold; height: 200px; }
.second { border: 2px solid silver; box-shadow: 0 0 15px silver; height: 170px; }
.third { border: 2px solid #cd7f32; box-shadow: 0 0 15px #cd7f32; height: 150px; }

/* Teams */
.teams {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: rgba(15,23,42,0.85);
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    width: 220px;
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<h1>🏆 LIVE SCOREBOARD</h1>

<div class="controls">
    <input id="teamName" placeholder="Team name">
    <button class="add" onclick="addTeam()">Add</button><br>

    <input id="search" placeholder="Search" oninput="render()">
</div>

<!-- 🏆 PODIUM -->
<div class="podium" id="podium"></div>

<div class="teams" id="teams"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* 🔥 FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let teams = {};

/* REALTIME LISTENER */
db.collection("teams").onSnapshot(snapshot => {
    teams = {};
    snapshot.forEach(doc => {
        teams[doc.id] = doc.data();
    });
    render();
});

/* ADD TEAM */
function addTeam(){
    let name = document.getElementById("teamName").value.trim();
    if(!name) return;

    db.collection("teams").doc(name).set({
        score: 0
    });

    document.getElementById("teamName").value="";
}

/* CHANGE SCORE */
function change(name,val){
    let newScore = (teams[name].score || 0) + val;
    if(newScore < 0) newScore = 0;

    db.collection("teams").doc(name).update({
        score: newScore
    });
}

/* DELETE */
function del(name){
    if(confirm("Delete " + name + "?")){
        db.collection("teams").doc(name).delete();
    }
}

/* EDIT */
function edit(oldName){
    let newName = prompt("New name:", oldName);
    if(!newName || teams[newName]) return;

    db.collection("teams").doc(newName).set({
        score: teams[oldName].score
    });

    db.collection("teams").doc(oldName).delete();
}

/* 🏆 PODIUM */
function renderPodium(sorted){
    let p = document.getElementById("podium");

    let top1 = sorted[0];
    let top2 = sorted[1];
    let top3 = sorted[2];

    p.innerHTML = "";

    if(top2){
        p.innerHTML += `
        <div class="place second">
            <h2>🥈 2nd</h2>
            <h3>${top2[0]}</h3>
            <p>${top2[1].score} pts</p>
        </div>`;
    }

    if(top1){
        p.innerHTML += `
        <div class="place first">
            <h2>🥇 1st</h2>
            <h3>${top1[0]}</h3>
            <p>${top1[1].score} pts</p>
        </div>`;
    }

    if(top3){
        p.innerHTML += `
        <div class="place third">
            <h2>🥉 3rd</h2>
            <h3>${top3[0]}</h3>
            <p>${top3[1].score} pts</p>
        </div>`;
    }
}

/* RENDER */
function render(){
    let c = document.getElementById("teams");
    let search = document.getElementById("search").value.toLowerCase();

    let sorted = Object.entries(teams)
        .sort((a,b)=>b[1].score-a[1].score);

    renderPodium(sorted);

    c.innerHTML = "";

    let rank = 1;

    for(let [name,data] of sorted){
        if(!name.toLowerCase().includes(search)) continue;

        c.innerHTML += `
        <div class="card">
            <h3>#${rank} ${name}</h3>
            <p>${data.score} pts</p>

            <button class="point" onclick="change('${name}',1)">+1</button>
            <button class="point" onclick="change('${name}',5)">+5</button>
            <button class="point" onclick="change('${name}',-1)">-1</button>
            <button class="point" onclick="change('${name}',-5)">-5</button><br>

            <button class="edit" onclick="edit('${name}')">Edit</button>
            <button class="del" onclick="del('${name}')">Delete</button>
        </div>`;
        rank++;
    }
}
</script>

</body>
</html>
